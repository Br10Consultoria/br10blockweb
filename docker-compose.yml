version: '3.9'

# =============================================================================
# BR10 Block Web - Docker Compose (Servidor Central)
# Integrado com Traefik existente via rede network_public
# =============================================================================
# Uso:
#   1. cp .env.example .env        (edite as senhas!)
#   2. docker compose up -d        (sobe todos os containers)
#   3. docker compose exec app python init_db.py --admin-user admin --admin-pass SUASENHA
#
# Acesso:
#   - https://br10blockweb.br10consultoria.com.br  (via Traefik)
#
# Observação: O Nginx foi removido pois o Traefik já faz o proxy reverso.
#             Os containers postgres e redis ficam apenas na rede interna.
# =============================================================================

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: br10-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-br10blockweb}
      POSTGRES_USER: ${DB_USER:-br10user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-br10pass}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - br10-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-br10user} -d ${DB_NAME:-br10blockweb}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: br10-redis
    command: >
      sh -c "redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
      $$([ -n '${REDIS_PASSWORD:-}' ] && echo '--requirepass ${REDIS_PASSWORD}' || echo '')"
    volumes:
      - redis-data:/data
    networks:
      - br10-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Aplicação Flask ──────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: br10blockweb:latest
    container_name: br10-app
    environment:
      FLASK_ENV: ${FLASK_ENV:-production}
      SECRET_KEY: ${SECRET_KEY:-mude_esta_chave_em_producao_use_openssl_rand_hex_32}
      DEBUG: "False"
      HOST: "0.0.0.0"
      PORT: "8084"
      # Banco de dados
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-br10blockweb}
      DB_USER: ${DB_USER:-br10user}
      DB_PASSWORD: ${DB_PASSWORD:-br10pass}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # Cache TTL (segundos)
      CACHE_TTL_DOMAINS: "300"
      CACHE_TTL_STATS: "60"
      CACHE_TTL_CLIENTS: "120"
      # Sessão
      SESSION_LIFETIME_HOURS: "24"
      # Upload (16MB)
      MAX_CONTENT_LENGTH: "16777216"
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - uploads-data:/app/data/uploads
      - exports-data:/app/data/exports
      - logs-data:/app/logs
    # SEM ports: — o Traefik acessa via rede interna, sem expor porta no host
    expose:
      - "8084"
    networks:
      - br10-internal   # rede interna (postgres, redis)
      - network_public  # rede do Traefik (acesso externo)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      # Habilitar Traefik para este container
      - "traefik.enable=true"
      # Roteamento HTTP → redireciona para HTTPS
      - "traefik.http.routers.br10blockweb-http.rule=Host(`${TRAEFIK_DOMAIN:-br10blockweb.br10consultoria.com.br}`)"
      - "traefik.http.routers.br10blockweb-http.entrypoints=web"
      - "traefik.http.routers.br10blockweb-http.middlewares=redirect-to-https"
      # Roteamento HTTPS
      - "traefik.http.routers.br10blockweb.rule=Host(`${TRAEFIK_DOMAIN:-br10blockweb.br10consultoria.com.br}`)"
      - "traefik.http.routers.br10blockweb.entrypoints=websecure"
      - "traefik.http.routers.br10blockweb.tls=true"
      - "traefik.http.routers.br10blockweb.tls.certresolver=letsencrypt"
      # Serviço interno (porta do Flask)
      - "traefik.http.services.br10blockweb.loadbalancer.server.port=8084"
      # Middleware de redirect HTTP→HTTPS (reutilizável)
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"
      # Rede que o Traefik deve usar para alcançar este container
      - "traefik.docker.network=network_public"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

networks:
  # Rede interna (somente postgres, redis e app se comunicam)
  br10-internal:
    driver: bridge

  # Rede externa do Traefik (já existente no host — não recriamos)
  network_public:
    external: true

volumes:
  postgres-data:
  redis-data:
  uploads-data:
  exports-data:
  logs-data:
