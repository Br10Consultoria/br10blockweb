server:
    # Interface e porta
    interface: 0.0.0.0
    port: 53
    do-ip4: yes
    do-ip6: no
    do-udp: yes
    do-tcp: yes

    # Controle de acesso (aceita consultas de qualquer IP da rede interna)
    access-control: 0.0.0.0/0 allow

    # Diretório de trabalho
    directory: "/opt/unbound/etc/unbound"

    # Logging
    verbosity: 1
    log-queries: no
    log-replies: no

    # Segurança
    hide-identity: yes
    hide-version: yes
    harden-glue: yes
    harden-dnssec-stripped: yes
    use-caps-for-id: yes

    # Performance
    num-threads: 2
    msg-cache-size: 64m
    rrset-cache-size: 128m
    cache-min-ttl: 300
    cache-max-ttl: 86400
    prefetch: yes
    prefetch-key: yes

    # RPZ (Response Policy Zone) - bloqueio de domínios
    # O arquivo é gerado pelo br10block_client.sh
    rpz:
        name: "br10block.rpz"
        zonefile: "/var/lib/br10api/br10block-rpz.zone"
        rpz-log: yes
        rpz-log-name: "br10block"

    # Forwarders (DNS upstream)
    forward-zone:
        name: "."
        forward-addr: 8.8.8.8
        forward-addr: 8.8.4.4
        forward-addr: 1.1.1.1

remote-control:
    control-enable: yes
    control-interface: 127.0.0.1
    control-port: 8953
    control-use-cert: no
