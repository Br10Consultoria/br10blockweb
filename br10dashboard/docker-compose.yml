# =============================================================================
# BR10 Dashboard - Docker Compose (Cliente DNS)
# =============================================================================
# Arquitetura:
#   - Unbound DNS: roda NO HOST (instalado via apt-get install unbound)
#   - Sincronização: roda NO HOST via cron (scripts/br10block_client.sh)
#   - Redis: container (cache do dashboard)
#   - Dashboard: container (interface web na porta 8085)
#
# Uso rápido:
#   1. cp .env.example .env        (edite BR10_SERVER_URL e BR10_API_KEY!)
#   2. sudo bash deploy_debian12.sh
#
# Portas:
#   - 8085 -> Dashboard web
#   - 53   -> Unbound DNS (no host, não container)
# =============================================================================

services:

  # Redis (cache do dashboard)
  redis:
    image: redis:7-alpine
    container_name: br10-redis-client
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - br10-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Dashboard Web
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: br10dashboard:latest
    container_name: br10-dashboard
    environment:
      BR10_SERVER_URL: ${BR10_SERVER_URL:-http://SEU_SERVIDOR:8084}
      BR10_API_KEY: ${BR10_API_KEY:-SUA_API_KEY}
      SECRET_KEY: ${SECRET_KEY:-mude_esta_chave_em_producao}
      SESSION_LIFETIME_HOURS: "24"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      BLOCKED_DOMAINS_PATH: "/var/lib/br10api/blocked_domains.txt"
      HISTORY_DIR: "/opt/br10dashboard/data/history"
      LOG_DIR: "/opt/br10dashboard/logs"
      UNBOUND_ZONE_FILE: "/var/lib/unbound/br10block-rpz.zone"
      USERS_FILE: "/opt/br10dashboard/config/users.json"
    volumes:
      - dashboard-config:/opt/br10dashboard/config
      - dashboard-logs:/opt/br10dashboard/logs
      - dashboard-data:/opt/br10dashboard/data
      # Monta o diretório do host para ler a lista de domínios gerada pelo cron
      - /var/lib/br10api:/var/lib/br10api:ro
    ports:
      - "${DASHBOARD_PORT:-8085}:8085"
    networks:
      - br10-net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

networks:
  br10-net:
    driver: bridge

volumes:
  redis-data:
  dashboard-config:
  dashboard-logs:
  dashboard-data:
