version: '3.9'

# =============================================================================
# BR10 Dashboard - Docker Compose (Cliente DNS)
# =============================================================================
# Uso rápido:
#   1. cp .env.example .env        (edite BR10_SERVER_URL e BR10_API_KEY!)
#   2. docker compose up -d        (sobe todos os containers)
#
# Portas expostas no host:
#   - 8085 -> Dashboard web (interface de visualização)
#   - 53   -> Unbound DNS (TCP + UDP)
#
# IMPORTANTE:
#   - Defina BR10_SERVER_URL=http://IP_DO_SERVIDOR:8084 no .env
#   - Defina BR10_API_KEY=SUA_KEY_AQUI no .env
#   - A sincronização ocorre automaticamente a cada 5 minutos
# =============================================================================

services:

  # Unbound DNS Server
  unbound:
    image: mvance/unbound:latest
    container_name: br10-unbound
    volumes:
      - ./unbound/unbound.conf:/opt/unbound/etc/unbound/unbound.conf:ro
      - unbound-zones:/var/lib/unbound
      - shared-data:/var/lib/br10api
    ports:
      - "53:53/tcp"
      - "53:53/udp"
    networks:
      - br10-net
    healthcheck:
      test: ["CMD", "dig", "@127.0.0.1", "google.com", "+short"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # Redis (cache do dashboard)
  redis:
    image: redis:7-alpine
    container_name: br10-redis-client
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - br10-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Sincronizador (executa br10block_client.sh a cada 5 minutos)
  sync:
    image: alpine:3.19
    container_name: br10-sync
    environment:
      BR10_SERVER_URL: ${BR10_SERVER_URL:-http://SEU_SERVIDOR:8084}
      BR10_API_KEY: ${BR10_API_KEY:-SUA_API_KEY}
      BR10_FORMAT: "rpz"
      UNBOUND_ZONE_FILE: "/var/lib/unbound/br10block-rpz.zone"
      BLOCKED_DOMAINS_FILE: "/var/lib/br10api/blocked_domains.txt"
      DATA_DIR: "/data"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      HTTP_TIMEOUT: "30"
      MAX_RETRIES: "3"
    volumes:
      - ./scripts/br10block_client.sh:/usr/local/bin/br10block_client.sh:ro
      - unbound-zones:/var/lib/unbound
      - shared-data:/var/lib/br10api
      - sync-data:/data
    networks:
      - br10-net
    depends_on:
      - redis
      - unbound
    command: >
      sh -c "
        apk add --no-cache bash curl jq redis &&
        chmod +x /usr/local/bin/br10block_client.sh &&
        echo 'Aguardando Unbound inicializar...' &&
        sleep 15 &&
        echo 'Executando primeira sincronizacao...' &&
        /usr/local/bin/br10block_client.sh --force || true &&
        echo 'Loop de sincronizacao a cada 5 minutos...' &&
        while true; do
          sleep 300
          /usr/local/bin/br10block_client.sh || true
        done
      "
    restart: unless-stopped

  # Dashboard Web
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: br10dashboard:latest
    container_name: br10-dashboard
    environment:
      BR10_SERVER_URL: ${BR10_SERVER_URL:-http://SEU_SERVIDOR:8084}
      BR10_API_KEY: ${BR10_API_KEY:-SUA_API_KEY}
      SECRET_KEY: ${SECRET_KEY:-mude_esta_chave_em_producao}
      SESSION_LIFETIME_HOURS: "24"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      BLOCKED_DOMAINS_PATH: "/var/lib/br10api/blocked_domains.txt"
      HISTORY_DIR: "/opt/br10dashboard/data/history"
      LOG_DIR: "/opt/br10dashboard/logs"
      UNBOUND_ZONE_FILE: "/var/lib/unbound/br10block-rpz.zone"
      USERS_FILE: "/opt/br10dashboard/config/users.json"
    volumes:
      - dashboard-config:/opt/br10dashboard/config
      - dashboard-logs:/opt/br10dashboard/logs
      - dashboard-data:/opt/br10dashboard/data
      - shared-data:/var/lib/br10api:ro
    ports:
      - "${DASHBOARD_PORT:-8085}:8085"
    networks:
      - br10-net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

networks:
  br10-net:
    driver: bridge

volumes:
  unbound-zones:
  shared-data:
  redis-data:
  sync-data:
  dashboard-config:
  dashboard-logs:
  dashboard-data:
