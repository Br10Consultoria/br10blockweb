<!-- templates/login.html -->
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — BR10 DNS Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%);
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            border: none;
            border-radius: 0.75rem;
            box-shadow: 0 1rem 3rem rgba(0,0,0,0.25);
        }
        .login-header {
            background: #0d6efd;
            color: #fff;
            border-radius: 0.75rem 0.75rem 0 0;
            padding: 2rem;
            text-align: center;
        }
        .login-header .brand-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .login-header h4 { font-weight: 700; margin: 0; font-size: 1.3rem; }
        .login-header p { margin: 0.25rem 0 0; font-size: 0.85rem; opacity: 0.85; }
        .login-body { background: #fff; padding: 2rem; border-radius: 0 0 0.75rem 0.75rem; }
        .form-label { font-weight: 500; color: #495057; }
        .btn-login { width: 100%; padding: 0.75rem; font-weight: 600; font-size: 1rem; }
        .footer-text { text-align: center; margin-top: 1.5rem; color: rgba(255,255,255,0.75); font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="w-100 px-3">
        <div class="login-card mx-auto">
            <div class="login-header">
                <div class="brand-icon"><i class="fas fa-shield-alt"></i></div>
                <h4>BR10 DNS Dashboard</h4>
                <p>Painel de Controle DNS</p>
            </div>
            <div class="login-body">
                {% for category, message in get_flashed_messages(with_categories=true) %}
                <div class="alert alert-{{ 'danger' if category == 'error' else ('success' if category == 'success' else 'warning') }} alert-dismissible fade show" role="alert">
                    <i class="fas fa-exclamation-circle me-1"></i> {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                {% endfor %}
                <form action="/login" method="post">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label for="username" class="form-label">
                            <i class="fas fa-user me-1 text-primary"></i> Usuário
                        </label>
                        <input type="text" id="username" name="username"
                               class="form-control form-control-lg"
                               placeholder="Digite seu usuário"
                               autocomplete="username" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">
                            <i class="fas fa-lock me-1 text-primary"></i> Senha
                        </label>
                        <input type="password" id="password" name="password"
                               class="form-control form-control-lg"
                               placeholder="Digite sua senha"
                               autocomplete="current-password" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-login">
                        <i class="fas fa-sign-in-alt me-1"></i> Entrar
                    </button>
                </form>
            </div>
        </div>
        <p class="footer-text">&copy; 2026 BR10 Consultoria — Todos os direitos reservados</p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
