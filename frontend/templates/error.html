{% extends "base.html" %}
{% block title %}Erro {{ code }} - {{ app_name }}{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-6 text-center">
            <div class="display-1 text-muted fw-bold">{{ code or '?' }}</div>
            <h2 class="mb-3">{{ error or 'Erro desconhecido' }}</h2>
            <p class="text-muted mb-4">Ocorreu um problema ao processar sua requisição.</p>
            <div class="d-flex gap-2 justify-content-center">
                <a href="{{ url_for('dashboard') }}" class="btn btn-primary">
                    <i class="fas fa-home"></i> Voltar ao Dashboard
                </a>
                <button onclick="history.back()" class="btn btn-outline-secondary">
                    <i class="fas fa-arrow-left"></i> Voltar
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
